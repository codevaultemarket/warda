<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realistic Animated Flower Garden</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="scene">
    <div class="sky-glow"></div>
    <div class="particles" id="particles"></div>

    <section class="garden" aria-label="Animated realistic flower garden">

      <div class="flower flower-big">
        <div class="stem">
          <span class="leaf leaf-left"></span>
          <span class="leaf leaf-right"></span>
        </div>

        <div class="rose">
          <span class="petal p1"></span>
          <span class="petal p2"></span>
          <span class="petal p3"></span>
          <span class="petal p4"></span>
          <span class="petal p5"></span>
          <span class="petal p6"></span>
          <span class="petal p7"></span>
          <span class="petal p8"></span>
          <span class="center"></span>
        </div>
      </div>

      <div class="flower flower-medium">
        <div class="stem">
          <span class="leaf leaf-left"></span>
          <span class="leaf leaf-right"></span>
        </div>

        <div class="rose rose-pink">
          <span class="petal p1"></span>
          <span class="petal p2"></span>
          <span class="petal p3"></span>
          <span class="petal p4"></span>
          <span class="petal p5"></span>
          <span class="petal p6"></span>
          <span class="petal p7"></span>
          <span class="petal p8"></span>
          <span class="center"></span>
        </div>
      </div>

      <div class="flower flower-small">
        <div class="stem">
          <span class="leaf leaf-left"></span>
          <span class="leaf leaf-right"></span>
        </div>

        <div class="rose rose-gold">
          <span class="petal p1"></span>
          <span class="petal p2"></span>
          <span class="petal p3"></span>
          <span class="petal p4"></span>
          <span class="petal p5"></span>
          <span class="petal p6"></span>
          <span class="petal p7"></span>
          <span class="petal p8"></span>
          <span class="center"></span>
        </div>
      </div>

      <div class="grass">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
